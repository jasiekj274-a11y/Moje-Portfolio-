<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VFX SMART DASHBOARD</title>
    <style>
        :root { --neon: #00ffff; --bg: #08080a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .dashboard { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        #canvas { width: 100%; aspect-ratio: 9/16; background: #111; border-radius: 15px; border: 1px solid #333; }
        .tool-btn { padding: 18px; background: #151515; border: 1px solid #333; border-radius: 12px; color: white; text-align: left; font-weight: bold; cursor: pointer; }
        .lang-switch { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('pl')">PL</button>
    </div>

    <canvas id="canvas" width="1080" height="1920"></canvas>
    
    <label class="tool-btn" id="btn-load" for="fileInput">📁 LOAD IMAGE</label>
    <input type="file" id="fileInput" accept="image/*" hidden onchange="loadPhoto(event)">
    
    <button class="tool-btn" id="btn-blur" onclick="alert('Blur')">🎨 BLUR / ERASE TOOL</button>
    <button class="tool-btn" id="btn-magic" onclick="alert('Magic')">✨ AUTO COLOR FIX</button>
    
    <button class="tool-btn" id="btn-render" style="background: var(--neon); color: black;" onclick="alert('Rendering')">RENDER FINAL VIDEO</button>
</div>

<script>
    const translations = {
        en: { load: "📁 LOAD IMAGE", blur: "🎨 BLUR / ERASE TOOL", magic: "✨ AUTO COLOR FIX", render: "RENDER FINAL VIDEO" },
        pl: { load: "📁 WCZYTAJ ZDJĘCIE", blur: "🎨 GUMKA / ROZMYCIE", magic: "✨ AUTO-KOLOR", render: "RENDERUJ WIDEO" }
    };

    function setLang(lang) {
        document.getElementById('btn-load').innerText = translations[lang].load;
        document.getElementById('btn-blur').innerText = translations[lang].blur;
        document.getElementById('btn-magic').innerText = translations[lang].magic;
        document.getElementById('btn-render').innerText = translations[lang].render;
    }

    // Pozostała logika (loadPhoto itp.) pozostaje bez zmian
</script>
</body>
</html>
