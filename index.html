<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFX CANVA-STYLE STUDIO</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #f0f2f5; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 70px; background: #222; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 10; }
        .icon { width: 50px; height: 50px; background: #333; margin-bottom: 20px; border-radius: 10px; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .workspace { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #canvas { background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 100%; max-height: 100%; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <label class="icon" for="fileInput">🖼️</label>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(event)">
        
        <div class="icon" onclick="alert('Tekst w budowie')">T</div>
        <div class="icon" onclick="alert('Filtry w budowie')">✨</div>
    </div>

    <div class="workspace">
        <canvas id="canvas" width="800" height="1200"></canvas>
    </div>

    <script>
        function handleImage(e) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
