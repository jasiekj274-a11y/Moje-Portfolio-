<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Studio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:80px;
background:#1f1f1f;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
}

.sidebar button{
width:60px;
height:60px;
margin:10px;
font-size:22px;
background:#333;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

.workspace{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

canvas{
background:black;
border-radius:10px;
}

.panel{
width:260px;
background:#1f1f1f;
padding:20px;
}

input[type=range]{
width:100%;
}

button.action{
width:100%;
padding:10px;
margin-top:10px;
background:#333;
border:none;
color:white;
cursor:pointer;
}

.timeline{
height:80px;
background:#222;
margin-top:20px;
position:relative;
}

.timeline div{
position:absolute;
top:0;
bottom:0;
width:2px;
background:white;
}

</style>
</head>

<body>

<div class="sidebar">

<input type="file" id="imageLoader" hidden>
<button onclick="document.getElementById('imageLoader').click()">📷</button>

<input type="file" id="videoLoader" hidden>
<button onclick="document.getElementById('videoLoader').click()">🎬</button>

<button onclick="resetFilters()">♻</button>

</div>

<div class="workspace">

<canvas id="canvas" width="720" height="1280"></canvas>

</div>

<div class="panel">

<h3>Filtry</h3>

<label>Brightness</label>
<input type="range" id="brightness" min="0" max="200" value="100">

<label>Contrast</label>
<input type="range" id="contrast" min="0" max="200" value="100">

<label>Saturation</label>
<input type="range" id="saturation" min="0" max="200" value="100">

<label>Blur</label>
<input type="range" id="blur" min="0" max="10" value="0">

<button class="action" onclick="exportImage()">Eksport obrazu</button>

<div class="timeline" id="timeline"></div>

</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let img = new Image()
let video = document.createElement("video")

let mediaType = null

const brightness = document.getElementById("brightness")
const contrast = document.getElementById("contrast")
const saturation = document.getElementById("saturation")
const blur = document.getElementById("blur")

function applyFilters(){

ctx.filter = `
brightness(${brightness.value}%)
contrast(${contrast.value}%)
saturate(${saturation.value}%)
blur(${blur.value}px)
`

ctx.clearRect(0,0,canvas.width,canvas.height)

if(mediaType==="image"){
ctx.drawImage(img,0,0,canvas.width,canvas.height)
}

if(mediaType==="video"){
ctx.drawImage(video,0,0,canvas.width,canvas.height)
}

}

document.querySelectorAll("input[type=range]").forEach(e=>{
e.addEventListener("input",applyFilters)
})

document.getElementById("imageLoader").addEventListener("change",e=>{

const file = e.target.files[0]
const reader = new FileReader()

reader.onload=function(event){

img.src = event.target.result

img.onload = ()=>{
mediaType="image"
applyFilters()
}

}

reader.readAsDataURL(file)

})

document.getElementById("videoLoader").addEventListener("change",e=>{

const file = e.target.files[0]

video.src = URL.createObjectURL(file)
video.play()

mediaType="video"

video.addEventListener("play",function loop(){

applyFilters()

requestAnimationFrame(loop)

})

})

function resetFilters(){

brightness.value=100
contrast.value=100
saturation.value=100
blur.value=0

applyFilters()

}

function exportImage(){

const link=document.createElement("a")

link.download="render.png"
link.href=canvas.toDataURL()

link.click()

}

function createTimeline(){

const timeline = document.getElementById("timeline")

for(let i=0;i<20;i++){

const line = document.createElement("div")

line.style.left = i*30+"px"

timeline.appendChild(line)

}

}

createTimeline()

</script>

</body>
</html>
