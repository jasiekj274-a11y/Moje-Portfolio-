<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>VFX CANVA-STYLE STUDIO</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #f0f2f5; font-family: sans-serif; }
        /* Pasek narzędzi (Sidebar) */
        .sidebar { width: 80px; background: #222; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .icon { width: 50px; height: 50px; background: #333; margin-bottom: 20px; border-radius: 10px; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; }
        /* Główny obszar */
        .workspace { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        #canvas { background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: move; }
        /* Panel właściwości */
        .properties { width: 250px; background: #fff; padding: 20px; border-left: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="icon" onclick="alert('Wczytaj obraz')">🖼️</div>
        <div class="icon" onclick="alert('Dodaj tekst')">T</div>
        <div class="icon" onclick="alert('Filtry')">✨</div>
    </div>

    <div class="workspace">
        <canvas id="canvas" width="400" height="700"></canvas>
    </div>

    <div class="properties">
        <h3>Właściwości</h3>
        <label>Jasność</label>
        <input type="range" style="width:100%">
    </div>

</body>
</html>
