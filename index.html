<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFX PRO GENERATOR</title>
  <style>
    body { background: #0b0e14; color: #ffffff; font-family: 'Courier New', monospace; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    h2 { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
    canvas { border: 2px solid #00ffff; box-shadow: 0 0 20px #00ffff; max-width: 90%; height: auto; background: #000; }
    .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
    button { padding: 15px; border: none; background: #00ffff; font-weight: bold; cursor: pointer; text-transform: uppercase; color: #000; }
    #status { color: #00ffff; margin: 10px; }
  </style>
</head>
<body>

  <h2>VFX PRO GENERATOR</h2>
  <canvas id="canvas" width="400" height="711"></canvas>
  <div id="status">Ready to create</div>

  <div class="controls">
    <input type="file" id="upload" multiple accept="image/*">
    <button onclick="startSlideshow()">1. RENDER VIDEO</button>
    <button onclick="stopRecording()">2. DOWNLOAD FILE</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    let images = [], mediaRecorder, chunks = [];

    document.getElementById('upload').onchange = (e) => { 
      images = Array.from(e.target.files);
      status.innerText = images.length + " files loaded";
    };

    function drawFrame(img, alpha) {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, 400, 711);
      ctx.globalAlpha = alpha;
      ctx.drawImage(img, 0, 0, 400, 711);
      ctx.globalAlpha = 1.0;
      ctx.fillStyle = "#00ffff";
      ctx.font = "bold 20px Courier New";
      ctx.fillText("VFX_PRO | PRODUCTION", 20, 680);
    }

    async function startSlideshow() {
      if (images.length === 0) return alert("Select files first!");
      status.innerText = "Recording...";
      chunks = [];
      const stream = canvas.captureStream(30);
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.start();

      for (let file of images) {
        const img = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const i = new Image();
            i.onload = () => resolve(i);
            i.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
        for(let i=0; i<=1; i+=0.1) {
          drawFrame(img, i);
          await new Promise(r => setTimeout(r, 50));
        }
        await new Promise(r => setTimeout(r, 1000));
      }
      mediaRecorder.stop();
      status.innerText = "Done! Click DOWNLOAD.";
    }

    function stopRecording() {
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'vfx-video.webm';
        a.click();
        status.innerText = "Saved!";
      };
    }
  </script>
</body>
</html>
