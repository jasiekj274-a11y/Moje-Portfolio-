<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFX EASY-PRO STUDIO</title>
    <style>
        :root { --primary: #3498db; --bg: #1a1a1a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 400px; }
        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 8px; background: #333; color: white; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--primary); }
        .slider-box { padding: 15px; background: #222; border-radius: 8px; margin: 10px 0; }
        input[type="range"] { width: 100%; }
        #canvas { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>VFX EASY-PRO STUDIO</h1>
    <canvas id="canvas" width="1080" height="1920"></canvas>
    
    <button class="btn-main" onclick="document.getElementById('fileInput').click()">ZACZNIJ PROJEKT</button>
    <input type="file" id="fileInput" hidden onchange="loadPhoto(event)">
    
    <button onclick="toggleFilter('sepia(60%)')">FILMOWY KLIMAT (LUT)</button>
    <button onclick="toggleFilter('saturate(200%)')">MAGIA KOLORÓW</button>
    
    <div class="slider-box">
        <label>SZYBKA GUMKA (ROZMIAR)</label>
        <input type="range" id="brush" min="10" max="200" value="50" oninput="updateBrush()">
    </div>

    <button class="btn-main" onclick="render()">RENDER PROJEKTU</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let img = new Image();

    function loadPhoto(e) {
        const reader = new FileReader();
        reader.onload = e => {
            img.onload = () => ctx.drawImage(img, 0, 0, 1080, 1920);
            img.src = e.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function toggleFilter(f) {
        ctx.filter = f;
        ctx.drawImage(img, 0, 0, 1080, 1920);
    }

    function render() {
        alert("Renderowanie... Twoje wideo będzie gotowe za chwilę!");
    }
</script>
</body>
</html>
