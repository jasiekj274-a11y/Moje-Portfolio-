<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFX SMART DASHBOARD</title>
    <style>
        :root { --neon: #00ffff; --bg: #08080a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .dashboard { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        #canvas { width: 100%; aspect-ratio: 9/16; background: #111; border-radius: 15px; border: 1px solid #333; }
        .tool-btn { padding: 18px; background: #151515; border: 1px solid #333; border-radius: 12px; color: white; text-align: left; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tool-btn:hover { border-color: var(--neon); }
        .main-render { background: var(--neon); color: black; padding: 20px; font-weight: bold; border-radius: 12px; border: none; margin-top: 10px; cursor: pointer; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="dashboard">
    <canvas id="canvas" width="1080" height="1920"></canvas>
    
    <label class="tool-btn" for="fileInput">📁 LOAD IMAGE</label>
    <input type="file" id="fileInput" accept="image/*" onchange="loadPhoto(event)">
    
    <button class="tool-btn" onclick="applyBlur()">🎨 BLUR / ERASE TOOL</button>
    <button class="tool-btn" onclick="applyMagic()">✨ AUTO COLOR FIX</button>
    
    <button class="main-render" onclick="render()">RENDER FINAL VIDEO</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let img = new Image();

    function loadPhoto(e) {
        const reader = new FileReader();
        reader.onload = event => {
            img.onload = () => ctx.drawImage(img, 0, 0, 1080, 1920);
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function applyBlur() {
        ctx.filter = 'blur(15px)';
        ctx.drawImage(img, 0, 0, 1080, 1920);
        ctx.filter = 'none';
        alert("Blur applied!");
    }

    function applyMagic() {
        ctx.filter = 'contrast(120%) saturate(130%) brightness(110%)';
        ctx.drawImage(img, 0, 0, 1080, 1920);
        ctx.filter = 'none';
    }

    function render() {
        alert("Exporting professional video... please wait.");
    }
</script>
</body>
</html>
