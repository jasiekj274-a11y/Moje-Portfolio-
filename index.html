<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFX OMNI-STUDIO v10 PRO</title>
    <style>
        :root { --neon: #00ffff; --bg: #08080a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 15px; }
        .tab-btn { padding: 10px; background: #222; border: none; color: #888; border-radius: 8px; margin: 2px; }
        .tab-btn.active { background: var(--neon); color: black; font-weight: bold; }
        canvas { width: 100%; max-width: 400px; aspect-ratio: 9/16; background: #000; display: block; margin: 10px auto; border-radius: 20px; }
        .control-group { background: #141418; padding: 15px; border-radius: 15px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="tabs">
        <button class="tab-btn active" onclick="showTab('edit')">EDIT</button>
        <button class="tab-btn" onclick="showTab('color')">COLOR</button>
        <button class="tab-btn" onclick="showTab('story')">VIDEO</button>
    </div>

    <canvas id="canvas" width="1080" height="1920"></canvas>

    <div id="edit" class="control-group">
        <input type="file" onchange="loadPhoto(event)">
        <button onclick="mode='blur'">ENABLE BLUR</button>
    </div>

    <div id="color" class="control-group" style="display:none">
        <label>Brightness</label>
        <input type="range" id="bright" min="0" max="200" value="100" oninput="apply()">
        <button onclick="savePreset()">SAVE PRESET</button>
        <button onclick="applyPreset()">APPLY PRESET</button>
    </div>

    <div id="story" class="control-group" style="display:none">
        <input type="file" id="files" multiple>
        <button onclick="render()">RENDER VIDEO</button>
    </div>

    <script>
        let baseImg, preset = {b: 100};
        
        function showTab(id) {
            document.querySelectorAll('.control-group').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function savePreset() { preset.b = document.getElementById('bright').value; alert("Preset saved!"); }
        function applyPreset() { document.getElementById('bright').value = preset.b; apply(); }
        
        function apply() {
            const b = document.getElementById('bright').value;
            const ctx = document.getElementById('canvas').getContext('2d');
            ctx.filter = `brightness(${b}%)`;
            if(baseImg) ctx.drawImage(baseImg, 0, 0, 1080, 1920);
        }

        function loadPhoto(e) {
            const r = new FileReader();
            r.onload = e => {
                baseImg = new Image();
                baseImg.onload = () => document.getElementById('canvas').getContext('2d').drawImage(baseImg, 0, 0, 1080, 1920);
                baseImg.src = e.target.result;
            };
            r.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
